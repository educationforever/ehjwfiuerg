<!DOCTYPE html>
<html>
<head>
    <title>Media Portal</title>
    <style>
        body { background: #000; color: white; font-family: sans-serif; text-align: center; }
        .container { margin-top: 50px; }
        input { padding: 12px; width: 50%; border-radius: 5px; border: none; }
        button { padding: 12px; background: #ff0000; color: white; border: none; cursor: pointer; }
        iframe { width: 90%; height: 80vh; border: 2px solid #333; margin-top: 20px; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Stealth Browser</h2>
        <input type="text" id="url" placeholder="Paste YouTube Link here...">
        <button onclick="loadVid()">Watch</button>
        <div id="display"></div>
    </div>

    <script>
        function loadVid() {
            let val = document.getElementById('url').value;
            let id = "";
            
            if (val.includes("v=")) id = val.split("v=")[1].split("&")[0];
            else if (val.includes("be/")) id = val.split("be/")[1];
            else id = val;

            // This pulls from Piped, which Securly usually doesn't recognize as YouTube
            document.getElementById('display').innerHTML = 
                `<iframe src="https://pipedapi.kavin.rocks/embed/${id}" allowfullscreen></iframe>`;
        }
    </script>
</body>
</html>
